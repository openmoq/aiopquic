name: CI

# PR + main test gate. Releases (TestPyPI -> PyPI -> GitHub Release) live
# in release.yml, triggered manually via workflow_dispatch.
#
# Tiers (post-enhancement):
#   - core: unit + loopback. Required on (linux, macos) x (3.12, 3.13, 3.14).
#   - native: picoquic_ct + picohttp_ct subprocess smoke. continue-on-error
#     initially while runner flakiness is characterized.
#   - perf-gate: bench_baselines_lowlevel short window, very conservative
#     floor. continue-on-error initially.
#
# Once the new tiers are stable across a few PRs the continue-on-error
# flags are removed and they become required.

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: core / ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Capture submodule SHAs for cache key
        id: shas
        run: |
          pico=$(cd third_party/picoquic && git rev-parse HEAD)
          ptls=$(cd third_party/picotls && git rev-parse HEAD)
          echo "pico=$pico" >> "$GITHUB_OUTPUT"
          echo "ptls=$ptls" >> "$GITHUB_OUTPUT"
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          # cmake + openssl@3 are usually preinstalled on macos-latest
          # runners; idempotent install for hardness.
          brew list cmake >/dev/null 2>&1 || brew install cmake
          brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3
      - name: Cache picoquic build
        id: picoquic-cache
        uses: actions/cache@v4
        with:
          path: third_party/picoquic/build
          key: picoquic-build-${{ runner.os }}-${{ steps.shas.outputs.pico }}-${{ steps.shas.outputs.ptls }}-${{ hashFiles('build_picoquic.sh', 'patches/*.patch') }}
      - name: Build picoquic
        if: steps.picoquic-cache.outputs.cache-hit != 'true'
        run: ./build_picoquic.sh
      - name: Install + test (core tier)
        timeout-minutes: 15
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          python -m pytest tests/ -v -m "not interop and not native"

  native:
    name: native picoquic_ct / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Capture submodule SHAs for cache key
        id: shas
        run: |
          pico=$(cd third_party/picoquic && git rev-parse HEAD)
          ptls=$(cd third_party/picotls && git rev-parse HEAD)
          echo "pico=$pico" >> "$GITHUB_OUTPUT"
          echo "ptls=$ptls" >> "$GITHUB_OUTPUT"
      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew list cmake >/dev/null 2>&1 || brew install cmake
          brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3
      - name: Cache picoquic build (incl. native test drivers)
        id: picoquic-cache
        uses: actions/cache@v4
        with:
          path: third_party/picoquic/build
          key: picoquic-build-native-${{ runner.os }}-${{ steps.shas.outputs.pico }}-${{ steps.shas.outputs.ptls }}-${{ hashFiles('build_picoquic.sh', 'patches/*.patch', 'build_picoquic_tests.sh') }}
      - name: Build picoquic + native test drivers
        if: steps.picoquic-cache.outputs.cache-hit != 'true'
        run: |
          ./build_picoquic.sh
          if [ -x ./build_picoquic_tests.sh ]; then
            ./build_picoquic_tests.sh
          else
            echo "::warning::build_picoquic_tests.sh not present; skipping native test driver build"
          fi
      - name: Install + run native tier
        timeout-minutes: 20
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          python -m pytest tests/ -v -m native || true

  peer-interop:
    # aioquic + qh3 are pip-installable Python QUIC implementations.
    # tests/interop/test_aioquic.py and test_qh3.py each spawn the
    # peer as a subprocess (tests/interop/peers/*_echo.py) and exchange
    # bytes with aiopquic in both directions. Skipped silently in the
    # core tier because aioquic/qh3 aren't in our dev extras; this job
    # installs them and runs those test files specifically.
    name: peer interop
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Capture submodule SHAs for cache key
        id: shas
        run: |
          pico=$(cd third_party/picoquic && git rev-parse HEAD)
          ptls=$(cd third_party/picotls && git rev-parse HEAD)
          echo "pico=$pico" >> "$GITHUB_OUTPUT"
          echo "ptls=$ptls" >> "$GITHUB_OUTPUT"
      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev
      - name: Cache picoquic build
        id: picoquic-cache
        uses: actions/cache@v4
        with:
          path: third_party/picoquic/build
          key: picoquic-build-${{ runner.os }}-${{ steps.shas.outputs.pico }}-${{ steps.shas.outputs.ptls }}-${{ hashFiles('build_picoquic.sh', 'patches/*.patch') }}
      - name: Build picoquic
        if: steps.picoquic-cache.outputs.cache-hit != 'true'
        run: ./build_picoquic.sh
      - name: Install aiopquic + Python QUIC peers
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          pip install aioquic qh3
      - name: Run Python-peer interop tests
        timeout-minutes: 10
        run: |
          python -m pytest \
            tests/interop/test_aioquic.py \
            tests/interop/test_qh3.py \
            -v --tb=short

  benchmark:
    name: benchmark / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Capture submodule SHAs for cache key
        id: shas
        run: |
          pico=$(cd third_party/picoquic && git rev-parse HEAD)
          ptls=$(cd third_party/picotls && git rev-parse HEAD)
          echo "pico=$pico" >> "$GITHUB_OUTPUT"
          echo "ptls=$ptls" >> "$GITHUB_OUTPUT"
      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew list cmake >/dev/null 2>&1 || brew install cmake
          brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3
      - name: Cache picoquic build
        id: picoquic-cache
        uses: actions/cache@v4
        with:
          path: third_party/picoquic/build
          key: picoquic-build-${{ runner.os }}-${{ steps.shas.outputs.pico }}-${{ steps.shas.outputs.ptls }}-${{ hashFiles('build_picoquic.sh', 'patches/*.patch') }}
      - name: Build picoquic
        if: steps.picoquic-cache.outputs.cache-hit != 'true'
        run: ./build_picoquic.sh
      - name: Run microbenches (RTT floor + datagram throughput)
        timeout-minutes: 5
        run: |
          # Two transport-level benches that complete deterministically
          # without the in-flight drain-tail issue bench_baselines_*
          # has on noisy hosted runners:
          #   - bench_latency_floor::test_bench_single_object_rtt:
          #     request/reply — RTT floor + p50/p99. User-facing media
          #     latency signal.
          #   - bench_datagram::test_bench_datagram_throughput:
          #     transport-level datagram path (100, 1000 datagrams).
          #     Catches regressions in the DATAGRAM frame send/recv
          #     path which has no other CI coverage.
          # Floor enforcement deferred until hosted-runner noise is
          # calibrated.
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          python -m pytest \
            tests/bench/bench_latency_floor.py::test_bench_single_object_rtt \
            tests/bench/bench_datagram.py \
            -v -s --benchmark-disable
