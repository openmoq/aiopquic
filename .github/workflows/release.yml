name: Release

# Manually triggered from the Actions tab. Creates the tag, runs a
# final test gate, then publishes to TestPyPI -> PyPI and cuts a
# GitHub Release.
#
# workflow_dispatch is restricted to repo collaborators with write
# access by GitHub's default policy, so this is effectively owner-only.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.2.0, must match N.N.N)'
        required: true
        type: string

# Opt every job + every third-party action into the Node 24 runtime
# ahead of GitHub's 2026-06-02 hard cutover (Node 20 removed entirely
# 2026-09-16). One env beats per-action version cherry-picking and
# covers actions that haven't shipped a Node-24 release yet.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Validate version and create tag
      id: validate
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ inputs.version }}"
        if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "error: version must be N.N.N, got '$VERSION'" >&2
          exit 1
        fi
        # Hard gate: pyproject.toml `version` must match the workflow
        # input. Without this, the build produced wheels with the OLD
        # version string (from pyproject) which then collided with an
        # already-published file on TestPyPI — caught only on upload,
        # after tag + test + build all succeeded. Fail loud, here.
        PYPROJECT_VERSION=$(awk -F'"' '/^version *= *"/{print $2; exit}' pyproject.toml)
        if [ "$VERSION" != "$PYPROJECT_VERSION" ]; then
          echo "error: pyproject.toml version '$PYPROJECT_VERSION' does not match input '$VERSION'" >&2
          echo "       bump pyproject.toml first, commit + push, then re-dispatch." >&2
          exit 1
        fi
        TAG="v$VERSION"
        if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
          echo "error: tag '$TAG' already exists" >&2
          exit 1
        fi
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "$TAG" -m "$TAG"
        git push origin "$TAG"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  test:
    needs: tag
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: v${{ needs.tag.outputs.version }}
        submodules: recursive
        fetch-depth: 0
    - uses: ./.github/actions/setup-aiopquic
    - name: Run test gate
      timeout-minutes: 15
      run: python -m pytest tests/ -v -m "not interop and not native"

  build-sdist:
    needs: [tag, test]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: v${{ needs.tag.outputs.version }}
        submodules: recursive
        fetch-depth: 0
    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
    - name: Build sdist
      run: |
        python -m pip install --upgrade pip build
        python -m build --sdist
    - name: Upload sdist
      uses: actions/upload-artifact@v4
      with:
        name: sdist
        path: dist/*.tar.gz

  build-wheels:
    needs: [tag, test]
    name: wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: ubuntu-latest                   # manylinux_2_34 x86_64
        - os: ubuntu-24.04-arm                # manylinux_2_34 aarch64
        - os: macos-14                        # macOS arm64 Apple Silicon
          macosx_deployment_target: "14.0"
        # macos-13 (Intel x86_64) was retired by GitHub in Oct 2025;
        # Intel Mac users install via sdist (build from source).
        # Apple Silicon is the active macOS target (since 2020).
    steps:
    - uses: actions/checkout@v4
      with:
        ref: v${{ needs.tag.outputs.version }}
        submodules: recursive
        fetch-depth: 0
    - name: Build wheels
      uses: pypa/cibuildwheel@v3.1.4
      env:
        # Forward submodule paths into the manylinux container so
        # build_picoquic.sh can find them (cibuildwheel mounts the
        # checkout at /project but submodules need to be present).
        CIBW_ENVIRONMENT_PASS_LINUX: GITHUB_WORKSPACE
        # Per-runner macOS deployment target — Homebrew dylibs are built
        # against the runner's native macOS, so the wheel target must
        # match (else delocate rejects bundling higher-min dylibs into
        # lower-min wheels). x86_64 wheel: macOS 13+; arm64 wheel: macOS 14+.
        MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target }}
    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}
        path: ./wheelhouse/*.whl

  publish-test:
    needs: [tag, build-sdist, build-wheels]
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist-staging
    - name: Flatten artifacts into dist/
      run: |
        mkdir -p dist
        find dist-staging -name '*.whl' -exec cp -v {} dist/ \;
        find dist-staging -name '*.tar.gz' -exec cp -v {} dist/ \;
        ls -la dist/
    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
    - name: Publish to TestPyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        TWINE_REPOSITORY_URL: https://test.pypi.org/legacy/
      run: |
        python -m pip install --upgrade twine
        twine upload dist/*

  publish-prod:
    needs: [tag, build-sdist, build-wheels, publish-test]
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist-staging
    - name: Flatten artifacts into dist/
      run: |
        mkdir -p dist
        find dist-staging -name '*.whl' -exec cp -v {} dist/ \;
        find dist-staging -name '*.tar.gz' -exec cp -v {} dist/ \;
        ls -la dist/
    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        TWINE_REPOSITORY_URL: https://upload.pypi.org/legacy/
      run: |
        python -m pip install --upgrade twine
        twine upload dist/*

  github-release:
    needs: [tag, publish-prod]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        ref: v${{ needs.tag.outputs.version }}
        fetch-depth: 0
    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="v${{ needs.tag.outputs.version }}"
        gh release create "$TAG" \
          --title "$TAG" \
          --generate-notes \
          --verify-tag
