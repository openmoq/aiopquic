name: Wheels dry-run

# Builds the wheel matrix WITHOUT publishing anywhere. Used to validate
# the cibuildwheel config + per-platform build steps before triggering
# the real Release workflow. Wheels are uploaded as workflow artifacts
# only; nothing reaches TestPyPI or PyPI.
#
# Triggers on push to gmarzot-aiomoqt-support (the v0.2.0 PR branch),
# or on manual workflow_dispatch from any branch.

on:
  push:
    branches:
      - gmarzot-aiomoqt-support
  workflow_dispatch:

# Opt every job + every third-party action into the Node 24 runtime
# ahead of GitHub's 2026-06-02 hard cutover (Node 20 removed entirely
# 2026-09-16). One env beats per-action version cherry-picking and
# covers actions that haven't shipped a Node-24 release yet.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-sdist:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
    - name: Build sdist
      run: |
        python -m pip install --upgrade pip build
        python -m build --sdist
    - name: Upload sdist
      uses: actions/upload-artifact@v4
      with:
        name: dryrun-sdist
        path: dist/*.tar.gz

  build-wheels:
    name: wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: ubuntu-latest                   # manylinux_2_34 x86_64
        - os: ubuntu-24.04-arm                # manylinux_2_34 aarch64
        - os: macos-14
          macosx_deployment_target: "14.0"
        # macos-13 (Intel x86_64) retired by GitHub Oct 2025.
        # Intel Mac users install via sdist.
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
    - name: Build wheels
      uses: pypa/cibuildwheel@v3.1.4
      env:
        CIBW_ENVIRONMENT_PASS_LINUX: GITHUB_WORKSPACE
        MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target }}
    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: dryrun-wheels-${{ matrix.os }}
        path: ./wheelhouse/*.whl
